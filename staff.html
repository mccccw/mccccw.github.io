    <script>
      (function () {
        const canvases = document.querySelectorAll('.viewer');
        const viewers = [];
        const embeddedSkins = window.MCCW_STAFF_SKINS || {};
        const fallbackSkin = window.MCCW_STAFF_FALLBACK_SKIN || 'assets/steve_skin.png';

        function sleep(ms) {
          return new Promise((resolve) => setTimeout(resolve, ms));
        }

        function getCanvasSize(canvas) {
          const rect = canvas.getBoundingClientRect();
          const width = Math.max(220, Math.floor(rect.width || canvas.clientWidth || canvas.width || 220));
          const height = Math.max(260, Math.floor(rect.height || canvas.clientHeight || canvas.height || 260));
          return { width, height };
        }

        async function loadSkinResilient(viewer, username) {
          const embedded = embeddedSkins[username];
          if (embedded) {
            try {
              await viewer.loadSkin(embedded);
              return true;
            } catch (error) {
              console.warn(`Embedded skin failed for ${username}`, error);
            }
          }

          const sources = [
            `https://mc-heads.net/skin/${username}`,
            `https://minotar.net/skin/${username}`,
            `https://mineskin.eu/skin/${username}`,
          ];

          for (const source of sources) {
            for (let attempt = 0; attempt < 2; attempt++) {
              try {
                await viewer.loadSkin(source);
                return true;
              } catch (error) {
                if (attempt === 1) {
                  console.warn(`Skin source failed for ${username}: ${source}`, error);
                }
                await sleep(180);
              }
            }
          }

          try {
            await viewer.loadSkin(fallbackSkin);
            return false;
          } catch (error) {
            console.error(`Fallback skin failed for ${username}`, error);
            return false;
          }
        }

        async function initViewer(canvas) {
          const username = canvas.dataset.skin;
          const initialSize = getCanvasSize(canvas);
          canvas.width = initialSize.width;
          canvas.height = initialSize.height;

          const viewer = new skinview3d.SkinViewer({
            canvas: canvas,
            width: initialSize.width,
            height: initialSize.height,
          });
          viewers.push(viewer);

          await loadSkinResilient(viewer, username);

          viewer.pixelRatio = 1;
          viewer.zoom = 0.9;
          viewer.fov = 50;
          viewer.autoRotate = false;
          viewer.animation = new skinview3d.WalkingAnimation();
          viewer.playerObject.rotation.y = 0.3;

          attachMouseRotation(canvas, viewer);

          const resizeObserver = new ResizeObserver(() => {
            const size = getCanvasSize(canvas);
            if (size.width > 0 && size.height > 0) {
              viewer.width = size.width;
              viewer.height = size.height;
            }
          });
          resizeObserver.observe(canvas);
        }

        function attachMouseRotation(canvas, viewer) {
          let dragging = false;
          let lastX = 0;
          let spinVelocity = 0;
          let rafId = null;

          function stopInertia() {
            if (rafId !== null) {
              cancelAnimationFrame(rafId);
              rafId = null;
            }
          }

          function startInertia() {
            stopInertia();
            const tick = () => {
              if (dragging || Math.abs(spinVelocity) < 0.00045) {
                spinVelocity = 0;
                rafId = null;
                return;
              }
              viewer.playerObject.rotation.y += spinVelocity;
              spinVelocity *= 0.92;
              rafId = requestAnimationFrame(tick);
            };
            rafId = requestAnimationFrame(tick);
          }

          canvas.addEventListener('pointerdown', (event) => {
            dragging = true;
            lastX = event.clientX;
            spinVelocity = 0;
            stopInertia();
            canvas.setPointerCapture(event.pointerId);
          });

          canvas.addEventListener('pointermove', (event) => {
            if (!dragging) {
              return;
            }
            const deltaX = event.clientX - lastX;
            lastX = event.clientX;
            spinVelocity = deltaX * 0.012;
            viewer.playerObject.rotation.y += spinVelocity;
          });

          canvas.addEventListener('pointerup', (event) => {
            dragging = false;
            if (canvas.hasPointerCapture(event.pointerId)) {
              canvas.releasePointerCapture(event.pointerId);
            }
            startInertia();
          });

          canvas.addEventListener('pointercancel', (event) => {
            dragging = false;
            spinVelocity = 0;
            if (canvas.hasPointerCapture(event.pointerId)) {
              canvas.releasePointerCapture(event.pointerId);
            }
            stopInertia();
          });
        }

        (async function boot() {
          if (!window.skinview3d || !window.skinview3d.SkinViewer) {
            console.error('skinview3d failed to load.');
            return;
          }

          await new Promise((resolve) => requestAnimationFrame(resolve));

          for (const canvas of canvases) {
            try {
              await initViewer(canvas);
            } catch (error) {
              console.error(`Viewer init failed for ${canvas.dataset.skin}`, error);
            }
            await sleep(180);
          }
        })();
      })();
    </script>
